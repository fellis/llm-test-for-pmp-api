# Single LLM backend: model chosen by MODEL_PROFILE (see config/models.json).
# Run: ./scripts/start.sh <profile>  (e.g. coding | reasoning | chat)
# Models are cached in ./models (Hugging Face cache), not re-downloaded.

services:
  llm:
    build: ./llm
    image: llm-backend
    container_name: llm-backend
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_PROFILE=${MODEL_PROFILE:-coding}
      - CONFIG_PATH=/config/models.json
    volumes:
      - ./models:/root/.cache/huggingface
      - ./config:/config:ro
    ports:
      - "8002:8002"
    shm_size: "8gb"
    restart: unless-stopped

  api:
    build: ./api
    container_name: llm-api
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://llm:8002
      - BACKEND_MODEL_ID=${BACKEND_MODEL_ID:-Qwen/Qwen2.5-Coder-14B-Instruct-AWQ}
    # Optional: mount auth.json for Bearer token auth
    # volumes:
    #   - ./auth.json:/app/auth.json
    restart: unless-stopped

  # CPU-only Ollama for Signal Hunter classification (qwen2.5:7b in RAM, GPU untouched)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    environment:
      - OLLAMA_NUM_GPU=0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6

  # Pulls qwen2.5:7b once on startup (no-op if already cached in ollama_data volume)
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "qwen2.5:7b"]
    restart: "no"

volumes:
  ollama_data:
