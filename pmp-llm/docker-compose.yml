# Single LLM backend: model chosen by MODEL_PROFILE (see config/models.json).
# Run: ./scripts/start.sh <profile>  (e.g. coding | reasoning | chat)
# Models are cached in ./models (Hugging Face cache), not re-downloaded.

services:
  llm:
    build: ./llm
    image: llm-backend
    container_name: llm-backend
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_PROFILE=${MODEL_PROFILE:-coding}
      - CONFIG_PATH=/config/models.json
    volumes:
      - ./models:/root/.cache/huggingface
      - ./config:/config:ro
    ports:
      - "8002:8002"
    shm_size: "8gb"
    restart: unless-stopped

  api:
    build: ./api
    container_name: llm-api
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://llm:8002
      - BACKEND_MODEL_ID=${BACKEND_MODEL_ID:-Qwen/Qwen2.5-Coder-14B-Instruct-AWQ}
    # Optional: mount auth.json for Bearer token auth
    # volumes:
    #   - ./auth.json:/app/auth.json
    restart: unless-stopped

  # MADLAD-400-10B translation service (CPU, CTranslate2)
  # Exposed on port 6340, accessible from signal-hunter VPS via 10.10.10.4:6340
  translator:
    build: ./translator
    container_name: translator
    ports:
      - "6340:6340"
    volumes:
      - translator_models:/models
    environment:
      - MODEL_ID=santhosh/madlad400-10b-ct2
      - MODEL_DIR=/models/madlad400-10b-ct2
      # 64 EPYC cores: 4 parallel requests x 16 threads each
      - INTER_THREADS=4
      - INTRA_THREADS=16
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6340/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  translator_models:
